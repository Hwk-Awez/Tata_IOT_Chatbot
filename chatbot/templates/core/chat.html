<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tata Steel IoT Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1E2A3A;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: #C8102E;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header span {
            font-size: 13px;
            opacity: 0.8;
        }

        /* Chat window */
        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Messages */
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.user {
            background-color: #2E75B6;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background-color: #162032;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a3f55;
        }

        .message.bot .sql-block {
            background-color: #0d1b2a;
            border: 1px solid #2a3f55;
            border-radius: 6px;
            padding: 10px 12px;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #7ec8e3;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.bot .sql-label {
            font-size: 11px;
            color: #7ec8e3;
            margin-top: 10px;
            opacity: 0.7;
        }

        .message.loading {
            background-color: #162032;
            align-self: flex-start;
            border: 1px solid #2a3f55;
            color: #aaaaaa;
            font-style: italic;
        }

        /* Input area */
        .input-area {
            padding: 16px 24px;
            background-color: #162032;
            border-top: 1px solid #2a3f55;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background-color: #1E2A3A;
            border: 1px solid #2a3f55;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }

        .input-area input::placeholder {
            color: #666;
        }

        .input-area input:focus {
            border-color: #2E75B6;
        }

        .input-area button {
            padding: 12px 24px;
            background-color: #C8102E;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .input-area button:hover {
            background-color: #a00d24;
        }

        .input-area button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        /* Suggested questions */
        .suggestions {
            padding: 0 24px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .suggestion-btn {
            padding: 6px 12px;
            background-color: #162032;
            border: 1px solid #2a3f55;
            border-radius: 20px;
            color: #aaaaaa;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            border-color: #2E75B6;
            color: #ffffff;
        }

        /* Scrollbar */
        .chat-window::-webkit-scrollbar {
            width: 6px;
        }

        .chat-window::-webkit-scrollbar-track {
            background: #1E2A3A;
        }

        .chat-window::-webkit-scrollbar-thumb {
            background: #2a3f55;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div>
            <h1>🏭 Tata Steel IoT Assistant</h1>
            <span>Ask questions about machine performance, deviations, and consumption</span>
        </div>
    </div>

    <!-- Chat window -->
    <div class="chat-window" id="chatWindow">
        <div class="message bot">
            Hello! I can answer questions about your industrial machines at Tata Steel. Try asking about machine performance, deviation alerts, LPG consumption, welding current, or shift comparisons.
        </div>
    </div>

    <!-- Suggested questions -->
    <div class="suggestions">
        <button class="suggestion-btn" onclick="askSuggestion(this)">Which machine has the most current deviations?</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">Total LPG consumption by shift</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">Average welding current for Rectifier1</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">Which machines were active today?</button>
    </div>

    <!-- Input area -->
    <div class="input-area">
        <input
            type="text"
            id="queryInput"
            placeholder="Ask about machine performance, deviations, consumption..."
            onkeydown="if(event.key === 'Enter') sendMessage()"
        />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const queryInput = document.getElementById('queryInput');
        const sendBtn   = document.getElementById('sendBtn');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        function askSuggestion(btn) {
            queryInput.value = btn.textContent;
            sendMessage();
        }

        async function sendMessage() {
            const query = queryInput.value.trim();
            if (!query) return;

            // Show user message
            addMessage(query, 'user');
            queryInput.value = '';
            sendBtn.disabled = true;

            // Show loading
            const loadingMsg = addMessage('Thinking...', 'loading');

            try {
                const response = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();

                // Remove loading message
                loadingMsg.remove();

                // Show answer + SQL
                const botHTML = `
                    <div>${data.answer}</div>
                    <div class="sql-label">SQL executed:</div>
                    <div class="sql-block">${data.sql}</div>
                `;
                addMessage(botHTML, 'bot');

            } catch (error) {
                loadingMsg.remove();
                addMessage('Something went wrong. Please try again.', 'bot');
            }

            sendBtn.disabled = false;
            queryInput.focus();
        }
    </script>

</body>
</html>
